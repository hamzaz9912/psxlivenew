[project]
name = "psx-forecasting"
version = "0.1.0"
description = "PSX KSE-100 Forecasting Dashboard with ML predictions"
requires-python = ">=3.11"
dependencies = [
    # Core ML/AI - Critical for Streamlit Cloud
    "scikit-learn>=1.5.0",
    "scipy>=1.14.0",
    "numpy>=2.3.1",
    
    # Data processing
    "pandas>=2.3.0",
    "joblib>=1.4.0",
    "threadpoolctl>=3.5.0",
    
    # Visualization
    "plotly>=6.2.0",
    "matplotlib>=3.9.0",
    "altair>=5.3.0",
    
    # Forecasting
    "prophet>=1.1.7",
    "statsmodels>=0.14.0",
    
    # Web scraping
    "beautifulsoup4>=4.13.4",
    "requests>=2.32.4",
    "trafilatura>=2.0.0",
    "newspaper3k>=0.2.8",
    "selenium>=4.34.0",
    "webdriver-manager>=4.0.2",
    
    # Streamlit specific
    "streamlit>=1.46.1",
    "streamlit-autorefresh>=1.0.1",
    "extra-streamlit-components>=0.1.71",
    
    # Utilities
    "pytz>=2025.2",
    "holidays>=0.75",
    "yfinance>=0.2.64",
    "chardet>=5.2.0",
    "pillow>=11.2.1",
    "openai>=1.93.0",
    "pydantic>=2.11.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
