[project]
name = "psx-forecasting"
version = "0.1.0"
description = "PSX KSE-100 Forecasting Dashboard"
requires-python = ">=3.11"
dependencies = [
    "streamlit>=1.35.0",
    "pandas>=2.0.0,<2.4.0",
    "numpy>=1.26.0,<2.1.0",
    "scikit-learn>=1.5.0,<1.6.0",
    "scipy>=1.13.0,<1.15.0",
    "plotly>=5.22.0,<6.0.0",
    "requests>=2.31.0,<3.0.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
